<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ad Promotion</title>
  <style>
    /* Reset and Layout */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    /* Promotion Banner Box */
    .container {
      max-width: 600px;
      margin: 50px auto;
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .ad {
      text-align: center;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #e53935; /* Eye-catching red promotion color */
    }

    p {
      margin-bottom: 30px;
      font-size: 16px;
      color: #666;
      line-height: 1.6;
    }

    /* Action button */
    .btn {
      display: inline-block;
      padding: 12px 25px;
      background-color: #4caf50;
      color: #ffffff;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: #45a049;
    }

    /* Back Home Link styling */
    .back-home {
      display: block;
      margin-top: 30px;
      color: #777;
      text-decoration: none;
      font-size: 14px;
    }

    .back-home:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Masthead Promotion Title -->
    <h1>Special Offer!</h1>
    
    <!-- Promotion Advertisement Content -->
    <div class="ad">
      <h2>Get 50% Off</h2>
      <p>Advertise with us now and enjoy a 50% discount on all category advertisements!</p>
      <a href="#" class="btn">Shop Now</a>
    </div>

    <!-- Navigation link back to news homepage -->
    <a href="mainpage.html" class="back-home">← Back to Homepage</a>
  </div>

</body>
</html>
