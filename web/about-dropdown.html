<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us & Review</title>
  <style>
    /* Global Background and Typography */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    /* Masthead Header Styles */
    header {
      background-color: white;
      padding: 30px;
      color: #000;
      border: 1px dashed #ccc;
      margin-bottom: 30px;
      text-align: center;
    }

    h1 {
      text-align: center;
      background-color: white;
      color: black;
      margin: 0 0 15px 0;
      letter-spacing: 10px;
      font: 50px helvetica, sans-serif;
    }

    /* Navigation list in the review page */
    nav ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    nav ul li {
      margin: 0 10px;
      background-color: white;
      padding: 5px;
    }

    nav ul li a {
      color: black;
      text-decoration: none;
      padding: 5px;
      background-color: white;
      font-weight: bold;
    }

    /* Feedback/Review Form Container */
    form {
      max-width: 400px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 25px;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    /* Submit Button Styles */
    input[type="submit"] {
      background-color: #4caf50;
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      transition: background-color 0.2s ease;
    }

    input[type="submit"]:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <!-- Page Header and Home Navigation -->
  <header>
    <h1 class="times">Review Us</h1>
    <nav>
      <ul>
        <li><a href="mainpage.html">HOME</a></li>
      </ul>
    </nav>
  </header>

  <!-- Review / Feedback Submission Form -->
  <main>
    <form action="submit.php" method="POST">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required placeholder="Enter your full name">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="Enter your email address">

      <label for="message">Message:</label>
      <textarea id="message" name="message" required placeholder="Write your review or feedback here..."></textarea>

      <input type="submit" value="Submit Review">
    </form>
  </main>

</body>
</html>
